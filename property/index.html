<html lang="zh-CN">
        <head>
    <meta charset="UTF-8" />

    <title>百川随笔</title>
    
    <!-- 主要样式文件 -->
    <link rel="stylesheet" href="https://tamhaywoo.github.io/styles/main.css" type="text/css" media="screen" />
    
    <!-- 代码高亮样式 -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.7.0/styles/default.min.css">
    
    <!-- 目录样式和返回顶部按钮样式 -->
    <style>
        /* 目录样式 */
        .post-layout {
            display: flex;
            gap: 30px;
            max-width: 1200px;
            margin: 0 auto;
        }
        
        .post-toc {
            position: sticky;
            top: 100px;
            align-self: flex-start;
            width: 200px;
            height: fit-content;
            max-height: calc(100vh - 130px);
            overflow-y: auto;
            background-color: #f9f9f9;
            border-radius: 8px;
            padding: 20px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
        }
        
        .toc-title {
            margin-top: 0;
            margin-bottom: 15px;
            font-size: 18px;
            font-weight: 600;
            color: #333;
        }
        
        .toc-nav ul {
            list-style: none;
            padding-left: 0;
            margin: 0;
        }
        
        .toc-nav li {
            line-height: 1.5;
        }
        
        .toc-nav li a {
            color: #666;
            text-decoration: none;
            transition: color 0.2s ease;
            display: inline-block;
            padding: 3px 0;
        }
        
        .toc-nav li a:hover {
            color: #23B175;
        }
        
        .toc-nav li.toc-h2 {
            font-weight: 500;
        }
        
        .toc-nav li.toc-h3 {
            padding-left: 15px;
            font-size: 0.95em;
        }
        
        .toc-nav li.toc-h4 {
            padding-left: 30px;
            font-size: 0.9em;
        }
        
        /* 文章元信息样式 */
        .post-meta {
            margin-top: 0.8rem;
            margin-bottom: 0.5rem;
            color: #666;
            font-size: 0.9rem;
        }
        
        .post-date {
            margin-right: 0.5rem;
        }
        
        .post-word-count {
            margin-right: 0.5rem;
        }
        
        .post-tags {
            display: inline-block;
        }
        
        .post-tags a {
            color: #666;
            text-decoration: none;
            padding: 0.2rem 0.3rem;
            background-color: #f5f5f5;
            border-radius: 3px;
            transition: all 0.3s ease;
        }
        
        .post-tags a:hover {
            background-color: #e0e0e0;
            color: #333;
        }
        
        .toc-nav li.active a {
            color: #23B175;
            font-weight: 600;
        }
        
        /* 文章内容区域调整 */
        .main-content {
            flex: 1;
        }
        
        /* 移动端适配 - 完全隐藏目录 */
        @media (max-width: 968px) {
            .post-toc {
                display: none;
            }
            
            .post-layout {
                flex-direction: column;
            }
        }
        
        /* 返回顶部按钮样式 */
        .back-to-top {
            position: fixed;
            bottom: 20px;
            right: 20px;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background-color: #23B175;
            color: #fff;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            opacity: 0;
            transition: opacity 0.3s ease;
            z-index: 9999;
        }
        
        .back-to-top:not(.u-hide) {
            opacity: 1;
        }
        
        .back-to-top:hover {
            background-color: #23B175;
        }
        
        /* 添加一个简单的箭头图标，不依赖字体图标 */
        .back-to-top::before {
            content: '↑';
            font-size: 20px;
            font-weight: bold;
        }

        /* 阅读进度条样式 */
        #reading-progress {
            position: fixed;
            top: 0;
            left: 0;
            height: 2px;
            background-color: #23B175;
            z-index: 10001;
            width: 0%;
            transition: width 0.2s ease;
        }
    </style>
    
    <!-- JavaScript 库 -->
    <script src="https://tamhaywoo.github.io/media/scripts/jquery.js" defer></script>
    <script src="https://tamhaywoo.github.io/media/scripts/jquery-migrate.min.js" defer></script>
    <script src="https://tamhaywoo.github.io/media/scripts/main.js" defer></script>
    <script defer>
        // 返回顶部功能
        document.addEventListener('DOMContentLoaded', function() {
            // 创建返回顶部按钮
            const backToTopBtn = document.createElement('div');
            backToTopBtn.className = 'back-to-top u-hide';
            backToTopBtn.id = 'backToTop';
            document.body.appendChild(backToTopBtn);
            
            // 显示/隐藏返回顶部按钮
            window.addEventListener('scroll', function() {
                if (window.pageYOffset > 300) {
                    backToTopBtn.classList.remove('u-hide');
                } else {
                    backToTopBtn.classList.add('u-hide');
                }
            });
            
            // 返回顶部点击事件
            backToTopBtn.addEventListener('click', function() {
                window.scrollTo({
                    top: 0,
                    behavior: 'smooth'
                });
            });
        });
    </script>
    
    <!-- 阅读进度条脚本 -->
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            const progressBar = document.getElementById('reading-progress');
            if (progressBar) {
                function updateProgress() {
                    const windowHeight = window.innerHeight;
                    const documentHeight = document.documentElement.scrollHeight;
                    const scrollTop = window.pageYOffset || document.documentElement.scrollTop;
                    const scrollPercentage = (scrollTop / (documentHeight - windowHeight)) * 100;
                    progressBar.style.width = scrollPercentage + '%';
                }
                
                // 添加滚动事件监听
                window.addEventListener('scroll', updateProgress);
                // 初始加载时更新一次
                updateProgress();
            }
        });
    </script><script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.7.0/highlight.min.js" defer></script>
    <script defer>
        document.addEventListener('DOMContentLoaded', function() {
            // 代码高亮
            if (typeof hljs !== 'undefined') {
                hljs.highlightAll();
            }
            
            // 文章字数统计
            function countWords() {
                const contentElement = document.querySelector('.post-content');
                const wordCountElement = document.getElementById('word-count');
                
                if (contentElement && wordCountElement) {
                    // 获取纯文本内容
                    const text = contentElement.textContent || contentElement.innerText;
                    // 移除多余的空白字符
                    const cleanedText = text.replace(/\s+/g, ' ').trim();
                    // 计算字数（中英文混合）
                    let wordCount = 0;
                    // 匹配中文、日文、韩文字符
                    const asianChars = cleanedText.match(/[\u4e00-\u9fa5\u3040-\u30ff\u3400-\u4dbf\uac00-\ud7af]/g);
                    if (asianChars) wordCount += asianChars.length;
                    // 匹配英文单词（连续的非空白字符）
                    const words = cleanedText.match(/[a-zA-Z]+/g);
                    if (words) wordCount += words.length;
                    // 显示结果
                    wordCountElement.textContent = wordCount;
                }
            }
            
            // 执行字数统计
            countWords();
            
            // 文章目录生成和滚动监听
            // 检测是否为移动设备（基于屏幕宽度）
            function isMobileDevice() {
                return window.innerWidth <= 968;
            }
            
            // 仅在非移动设备上生成目录
            if (!isMobileDevice()) {
                // 获取元素
                var postContent = document.querySelector('.post-content');
                var tocList = document.getElementById('post-toc');
                
                if (postContent && tocList) {
                    var headings = postContent.querySelectorAll('h2, h3, h4');
                    
                    if (headings.length > 0) {
                        // 生成目录项
                        for (var i = 0; i < headings.length; i++) {
                            var heading = headings[i];
                            // 为每个标题添加ID
                            var headingId = heading.getAttribute('id') || 'heading-' + i;
                            heading.setAttribute('id', headingId);
                            
                            // 创建目录项
                            var listItem = document.createElement('li');
                            listItem.className = 'toc-' + heading.tagName.toLowerCase();
                            
                            var link = document.createElement('a');
                            link.href = '#' + headingId;
                            link.textContent = heading.textContent;
                            
                            // 平滑滚动到标题
                            link.onclick = function(e) {
                                e.preventDefault();
                                var targetId = this.getAttribute('href').substring(1);
                                document.getElementById(targetId).scrollIntoView({ behavior: 'smooth' });
                            };
                            
                            listItem.appendChild(link);
                            tocList.appendChild(listItem);
                        }
                        
                        // 滚动监听，高亮当前目录项
                        window.onscroll = function() {
                            var scrollPosition = window.scrollY + 100;
                            
                            for (var i = 0; i < headings.length; i++) {
                                var heading = headings[i];
                                var headingTop = heading.offsetTop;
                                var nextHeading = i + 1 < headings.length ? headings[i + 1] : null;
                                var nextHeadingTop = nextHeading ? nextHeading.offsetTop : Infinity;
                                
                                var tocItem = tocList.children[i];
                                
                                if (scrollPosition >= headingTop && scrollPosition < nextHeadingTop) {
                                    // 移除所有active类
                                    for (var j = 0; j < tocList.children.length; j++) {
                                        tocList.children[j].classList.remove('active');
                                    }
                                    // 添加当前项active类
                                    tocItem.classList.add('active');
                                }
                            }
                        };
                        
                        // 触发一次滚动事件，确保初始状态正确
                        window.onscroll();
                    } else {
                        // 如果没有标题，隐藏目录
                        document.querySelector('.post-toc').style.display = 'none';
                    }
                }
            }
        });
    </script>
