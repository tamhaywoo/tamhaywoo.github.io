<script>
    // Theme toggle functionality
    document.addEventListener('DOMContentLoaded', function() {
        // Theme toggle buttons
        var sunBtn = document.getElementById('theme-toggle-sun');
        var moonBtn = document.getElementById('theme-toggle-moon');
        
        function toggleTheme() {
            var isDark = document.body.classList.contains('dark-theme');
            if (isDark) {
                document.body.classList.remove('dark-theme');
                localStorage.setItem('theme', 'light');
            } else {
                document.body.classList.add('dark-theme');
                localStorage.setItem('theme', 'dark');
            }
        }
        
        if (sunBtn) {
            sunBtn.addEventListener('click', toggleTheme);
        }
        if (moonBtn) {
            moonBtn.addEventListener('click', toggleTheme);
        }
    });

    // Footnotes support for Markdown footnotes [^1]
    document.addEventListener('DOMContentLoaded', function() {
        var entry = document.querySelector('.mod-post__entry');
        var footnotesContainer = document.querySelector('#post-footnotes');
        
        if (!entry) return;

        // Get the raw HTML content
        var content = entry.innerHTML;
        
        // Find footnote definitions - standard format [^1]: definition
        var footnoteDefs = {};
        var defRegex = /\[\^([^\]]+)\]:\s*([\s\S]*?)(?=<br\s*[\/]?>|\n\s*\n|\n\s*<h2|\n\s*$|$)/gi;
        
        var match;
        while ((match = defRegex.exec(content)) !== null) {
            var fnName = match[1];
            var fnContent = match[2].trim().replace(/<br\s*[\/]?>/gi, ' ').replace(/\s+/g, ' ');
            if (fnContent) {
                footnoteDefs[fnName] = fnContent;
            }
        }
        
        // If no definitions found, try to find definitions at the end of content
        // Look for pattern: [^1]: content at end of article
        if (Object.keys(footnoteDefs).length === 0) {
            // Try to find definitions by looking for [^name]: followed by content near end
            var lastPart = content.slice(-2000); // Get last 2000 chars
            var endDefRegex = /\[\^([^\]]+)\]:\s*([\s\S]{1,200}?)(?=<\/p>|$)/gi;
            while ((match = endDefRegex.exec(lastPart)) !== null) {
                var fnName = match[1];
                var fnContent = match[2].trim().replace(/<br\s*[\/]?>/gi, ' ').replace(/\s+/g, ' ');
                if (fnContent && fnContent.length > 2) {
                    footnoteDefs[fnName] = fnContent;
                }
            }
        }
        
        // Replace raw [^1] references with sup tags
        var footnoteRefRegex = /\[\^([^\]]+)\](?!\s*:)/g;
        content = content.replace(footnoteRefRegex, function(match, fnName) {
            if (footnoteDefs[fnName]) {
                return '<sup class="footnote-ref" id="fnref-' + fnName + '"><a href="#fn-' + fnName + '">[' + fnName + ']</a></sup>';
            }
            return match;
        });
        
        // Handle Gridea's special link format: <a href="encoded-url">^1</a>
        content = content.replace(/<a[^>]*>(\^?\d+)<\/a>/g, function(match, fnNum) {
            fnNum = fnNum.replace(/^\^/, '');
            if (footnoteDefs[fnNum]) {
                return '<sup class="footnote-ref" id="fnref-' + fnNum + '"><a href="#fn-' + fnNum + '">[' + fnNum + ']</a></sup>';
            }
            return match;
        });
        
        // Also handle links where href is URL-encoded content
        var encodedLinkRegex = /<a\s+href="([^"]+)"\s*>(\^?\d+)<\/a>/g;
        content = content.replace(encodedLinkRegex, function(match, href, fnNum) {
            fnNum = fnNum.replace(/^\^/, '');
            if (footnoteDefs[fnNum]) {
                return '<sup class="footnote-ref" id="fnref-' + fnNum + '"><a href="#fn-' + fnNum + '">[' + fnNum + ']</a></sup>';
            }
            return match;
        });
        
        // Remove footnote definitions from content
        content = content.replace(/\[\^([^\]]+)\]:\s*[\s\S]*?(?=<br\s*[\/]?>|\n\s*\n|<h2|$)/gi, '');
        content = content.replace(/<p>\s*<\/p>/g, '');
        content = content.replace(/<p>\s*<br\s*[\/]?>\s*<\/p>/g, '');
        
        entry.innerHTML = content;
        
        // Create the footnotes section
        var fnKeys = Object.keys(footnoteDefs);
        if (fnKeys.length > 0 && footnotesContainer) {
            var footnotesSection = document.createElement('section');
            footnotesSection.className = 'footnotes';
            
            var heading = document.createElement('h4');
            heading.className = 'footnotes-title';
            heading.textContent = '参考资料';
            footnotesSection.appendChild(heading);
            
            var ol = document.createElement('ol');
            ol.className = 'footnotes-list';
            
            fnKeys.forEach(function(fnName) {
                var li = document.createElement('li');
                li.id = 'fn-' + fnName;
                li.innerHTML = '<span class="footnote-content">' + footnoteDefs[fnName] + '</span> <a href="#fnref-' + fnName + '" class="footnote-backref">↩</a>';
                ol.appendChild(li);
            });
            
            footnotesSection.appendChild(ol);
            footnotesContainer.appendChild(footnotesSection);
        }
    });

    // Fetch random quote from API (override default text)
    document.addEventListener('DOMContentLoaded', function() {
        const quoteContainer = document.getElementById('quote-container');
        if (!quoteContainer) return;

        fetch('https://v1.hitokoto.cn/?c=i&encode=json')
            .then(function(response) {
                return response.json();
            })
            .then(function(data) {
                const textEl = document.getElementById('quote-text');
                const authorEl = document.getElementById('quote-author');
                if (textEl && data.hitokoto) {
                    textEl.textContent = data.hitokoto;
                }
                if (authorEl && data.from) {
                    authorEl.textContent = '—— ' + data.from;
                }
            })
            .catch(function(err) {
                // Use default text if API fails
            });
    });
</script>

        <script>
    (function () {
        const getSystemTheme = () => {
            if (window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches) {
                return 'dark';
            }
            return 'light';
        };

        const configDefault = 'light';
        const savedTheme = localStorage.getItem('theme');
        const theme = savedTheme || configDefault || getSystemTheme();

        if (theme === 'dark') {
            document.body.classList.add('dark-theme');
        }

        if (!savedTheme) {
            localStorage.setItem('theme', theme);
        }
    })();
</script>

                        <!-- 热力图 -->
                        <div class="heatmap-wrap">
                            <div id="heatmap-root"></div>
                            <div class="heatmap-footer">
                                <span id="heatmap-total"></span>
                                <div class="heatmap-legend">
                                    <span>少</span>
                                    <span class="heatmap-legend-cell" style="background:#ebedf0;"></span>

                        <!-- 闪念列表 -->
                        <div class="memos-list">
                            
                                <div class="memo-item "
                                    data-created="2026-05-02">
                                    <div class="memo-body">
                                        <div class="memo-content">
                                            <p>Gridea Pro是一个好产品，能够让Bloger更轻松地写东西。</p>

                                    <div class="memo-meta">

                        </div>

                        <!-- 分页控件 -->
                        <div class="memo-pagination" id="memo-pagination">
                            <a href="javascript:void(0);" id="memo-prev-btn" class="disabled" onclick="memoPrevPage()">←
                                上一页</a>
                            <span class="memo-page-info" id="memo-page-info"></span>
                            <a href="javascript:void(0);" id="memo-next-btn" onclick="memoNextPage()">下一页 →</a>
                        </div>

                        <script>
                            (function () {
                                var MEMO_PER_PAGE = 20;
                                var currentPage = 1;
                                var items = document.querySelectorAll('.memo-item');
                                var totalItems = items.length;
                                var totalPages = Math.ceil(totalItems / MEMO_PER_PAGE);

                                // 初始化内容折叠
                                items.forEach(function (item) {
                                    var body = item.querySelector('.memo-body');
                                    var content = item.querySelector('.memo-content');
                                    if (content && content.scrollHeight > 160) {
                                        body.classList.add('collapsed');
                                        var btn = document.createElement('button');
                                        btn.className = 'memo-expand-btn';
                                        btn.style.display = 'inline';
                                        btn.textContent = '展开全文 ▼';
                                        btn.onclick = function () {
                                            if (body.classList.contains('collapsed')) {
                                                body.style.maxHeight = content.scrollHeight + 'px';
                                                body.classList.remove('collapsed');
                                                btn.textContent = '收起 ▲';
                                            } else {
                                                body.style.maxHeight = '160px';
                                                body.classList.add('collapsed');
                                                btn.textContent = '展开全文 ▼';
                                            }
                                        };
                                        body.parentNode.insertBefore(btn, body.nextSibling);
                                    }
                                });

                                // ======= GitHub 风格热力图 =======
                                var heatmapData = {};
                                items.forEach(function (item) {
                                    var d = item.getAttribute('data-created');
                                    if (d) {
                                        var dateStr = d.substring(0, 10);
                                        heatmapData[dateStr] = (heatmapData[dateStr] || 0) + 1;
                                    }
                                });

                                var COLORS = ['#ebedf0', '#9be9a8', '#40c463', '#28df99', '#1a9f6b'];
                                var MONTHS = ['1月', '2月', '3月', '4月', '5月', '6月', '7月', '8月', '9月', '10月', '11月', '12月'];
                                var DAYS = ['日', '一', '二', '三', '四', '五', '六'];

                                var today = new Date();
                                today.setHours(0, 0, 0, 0);
                                // 找到 ~53 周前的周日作为起点（约一年）
                                var endDay = today.getDay(); // 0=Sun
                                var totalDays = 52 * 7 + endDay + 1;
                                var startDate = new Date(today);
                                startDate.setDate(startDate.getDate() - totalDays + 1);
                                // 对齐到周日
                                startDate.setDate(startDate.getDate() - startDate.getDay());

                                var totalWeeks = Math.ceil(totalDays / 7);

                                // 构建周列数据
                                var weeks = [];
                                for (var w = 0; w < totalWeeks; w++) {
                                    var week = [];
                                    for (var d = 0; d < 7; d++) {
                                        var cellDate = new Date(startDate);
                                        cellDate.setDate(cellDate.getDate() + w * 7 + d);
                                        var key = cellDate.getFullYear() + '-' + String(cellDate.getMonth() + 1).padStart(2, '0') + '-' + String(cellDate.getDate()).padStart(2, '0');
                                        var count = heatmapData[key] || 0;
                                        var level = count === 0 ? 0 : count === 1 ? 1 : count <= 3 ? 2 : count <= 5 ? 3 : 4;
                                        var future = cellDate > today;
                                        week.push({ date: cellDate, key: key, count: count, level: level, future: future, month: cellDate.getMonth(), dayOfMonth: cellDate.getDate() });
                                    }
                                    weeks.push(week);
                                }

                                // 计算月份标签：在月份的第一个出现的那一周标出
                                var monthLabels = []; // { weekIndex, label }
                                var lastMonth = -1;
                                for (var w = 0; w < weeks.length; w++) {
                                    // 使用该周的第一天（周日）的月份
                                    var firstDay = weeks[w][0];
                                    if (!firstDay.future && firstDay.month !== lastMonth) {
                                        monthLabels.push({ weekIndex: w, label: MONTHS[firstDay.month] });
                                        lastMonth = firstDay.month;
                                    }
                                }

                                // 构建 HTML 表格
                                // 添加 min-width 确保不被压缩，允许横向滚动
                                var html = '<table style="min-width: 600px;">';

                                // 月份行
                                html += '<tr><td class="heatmap-day-label"></td>';
                                var monthColIdx = 0;
                                for (var w = 0; w < totalWeeks; w++) {
                                    if (monthColIdx < monthLabels.length && monthLabels[monthColIdx].weekIndex === w) {
                                        // 计算 colspan: 直到下一个月标签或结尾
                                        var nextIdx = monthColIdx + 1 < monthLabels.length ? monthLabels[monthColIdx + 1].weekIndex : totalWeeks;
                                        var span = nextIdx - w;
                                        html += '<td colspan="' + span + '" class="heatmap-month-label">' + monthLabels[monthColIdx].label + '</td>';
                                        w += span - 1; // 跳过已合并的列
                                        monthColIdx++;
                                    } else {
                                        html += '<td class="heatmap-month-label"></td>';
                                    }
                                }
                                html += '</tr>';

                                // 7 行（周日到周六）
                                for (var d = 0; d < 7; d++) {
                                    html += '<tr>';
                                    html += '<td class="heatmap-day-label">' + DAYS[d] + '</td>';
                                    for (var w = 0; w < weeks.length; w++) {
                                        var c = weeks[w][d];
                                        if (c.future) {
                                            html += '<td></td>';
                                        } else {
                                            html += '<td class="cell" data-level="' + c.level + '" style="background:' + COLORS[c.level] + ';" title="' + c.key + ': ' + c.count + ' 条闪念"></td>';
                                        }
                                    }
                                    html += '</tr>';
                                }

                                html += '</table>';
                                var root = document.getElementById('heatmap-root');
                                root.innerHTML = html;
                                document.getElementById('heatmap-total').textContent = '过去一年共 ' + totalItems + ' 条闪念';

                                // 自动滚动到最右侧
                                setTimeout(function () {
                                    var wrap = document.querySelector('.heatmap-wrap');
                                    if (wrap) {
                                        wrap.scrollLeft = wrap.scrollWidth;
                                    }
                                }, 100);

                                // ======= 分页 =======
                                function updatePagination() {
                                    for (var i = 0; i < items.length; i++) {
                                        var start = (currentPage - 1) * MEMO_PER_PAGE;
                                        var end = currentPage * MEMO_PER_PAGE;
                                        if (i >= start && i < end) {
                                            items[i].classList.remove('memo-hide');
                                        } else {
                                            items[i].classList.add('memo-hide');
                                        }
                                    }
                                    var prevBtn = document.getElementById('memo-prev-btn');
                                    var nextBtn = document.getElementById('memo-next-btn');
                                    var pageInfo = document.getElementById('memo-page-info');

                                    prevBtn.className = currentPage <= 1 ? 'disabled' : '';
                                    nextBtn.className = currentPage >= totalPages ? 'disabled' : '';
                                    pageInfo.textContent = currentPage + ' / ' + totalPages;

                                    if (totalPages <= 1) {
                                        document.getElementById('memo-pagination').style.display = 'none';
                                    }
                                }

                                window.memoNextPage = function () {
                                    if (currentPage < totalPages) { currentPage++; updatePagination(); window.scrollTo(0, 0); }
                                };
                                window.memoPrevPage = function () {
                                    if (currentPage > 1) { currentPage--; updatePagination(); window.scrollTo(0, 0); }
                                };

                                updatePagination();
                            })();
                        </script>

                        

                </div>
