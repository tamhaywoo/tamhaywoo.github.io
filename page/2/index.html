                                <p>" <span id="quote-text">他想，我的人生之路确实古怪曲折。少年时，我只知神明和献祭。青年时，我只知苦修、思考和禅定；我渴求梵天，崇拜永恒的阿特曼。壮年时，我追随忏悔者生活在林中，漠视肉体，忍受酷暑严寒和饥饿。之后我又奇迹般地与佛陀和他至高的法义相遇，关乎圆一世界的真理如血液般在我体内奔涌，但我又不得不告别佛陀及其伟大学说。</span> "</p>
